name: Farm Yawmi — Daily Morning Brief

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  send-daily-brief:
    runs-on: ubuntu-latest
    steps:
      - name: Send daily brief
        uses: dawidd6/action-send-mail@v4
        with:
          server_address: smtp.gmail.com
          server_port: 587
          secure: false
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "Farm Yawmi - Daily Brief"
          to: benaicha07@gmail.com
          from: Farm Yawmi <benaicha07@gmail.com>
          body: |
            Farm Yawmi - Daily Brief
            Khenchela, Algeria - 394 trees

            Good morning Hani!

            Open your farm dashboard:
            https://benaicha07-rgb.github.io/farm-yawmi

            --- JUNE TASKS ---
            - K+P fertiliser (potassium + phosphorus)
            - Irrigate every 5-7 days
            - Monitor spider mites
            - Cherry harvest check (Block B)

            --- IRRIGATION REMINDER ---
            Block A (Apple 4yr): every 5-7 days
            Block B (Mixed):     every 5-7 days
            Block C (Apple 3yr): every 5-7 days
            Block D (Apple 7yr): every 5-7 days

            --- HARVEST CALENDAR ---
            Cherry:      June-July
            Apricot:     July-August
            Fig:         August-September
            Grapes:      September
            Apple G2:    September-October
            Pomegranate: October
            Olive:       October-November

            ---
            Farm Yawmi - Automated daily brief
            https://benaicha07-rgb.github.io/farm-yawmi
